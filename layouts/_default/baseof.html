<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ T "metaDescription" }}" />
    <link rel="icon" type="image/png" href="{{ "assets/icon.png" | relURL }}" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: "#03a9f4",
                soft: "#e7f7ff",
                deep: "#0288d1"
              }
            },
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            boxShadow: {
              card: "0 15px 35px rgba(2, 136, 209, 0.15)"
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-white text-[#1a1a1a] antialiased">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top_right,_rgba(3,169,244,0.12),_transparent_50%),radial-gradient(circle_at_bottom_left,_rgba(3,169,244,0.08),_transparent_45%)]">
      <header class="mx-auto w-full max-w-6xl px-4 pt-6 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between rounded-2xl border border-brand/20 bg-white/90 px-4 py-3 shadow-sm backdrop-blur sm:px-5">
          <a href="{{ "/" | relLangURL }}" class="inline-flex items-center gap-3" aria-label="{{ T "brandAriaLabel" }}">
            <img src="{{ "assets/icon.png" | relURL }}" alt="{{ T "brandIconAlt" }}" class="h-10 w-10 rounded-xl" />
            <span class="text-lg font-extrabold tracking-tight text-[#1a1a1a]">{{ .Site.Title }}</span>
          </a>
          <nav aria-label="{{ T "languageSwitcher" }}" class="flex items-center gap-1 rounded-full border border-brand/20 bg-brand-soft/60 p-1">
            {{ range .AllTranslations }}
              <a
                href="{{ .RelPermalink }}"
                class="rounded-full px-3 py-1 text-xs font-extrabold tracking-wide transition {{ if eq $.Site.Language.Lang .Lang }}bg-brand text-white shadow-sm{{ else }}text-[#1a1a1a]/75 hover:bg-brand/15{{ end }}"
                aria-current="{{ if eq $.Site.Language.Lang .Lang }}page{{ else }}false{{ end }}"
              >
                {{ .Lang | upper }}
              </a>
            {{ end }}
          </nav>
        </div>
      </header>

      {{ block "main" . }}{{ end }}

      <footer class="mx-auto mt-16 w-full max-w-6xl px-4 pb-8 sm:px-6 lg:px-8">
        <div class="flex flex-col items-start justify-between gap-4 rounded-2xl border border-brand/20 bg-white/90 px-4 py-5 text-sm shadow-sm sm:flex-row sm:items-center sm:px-5">
          <p class="text-[#1a1a1a]/70">{{ T "footerNote" }}</p>
          <ul class="flex items-center gap-4 text-brand">
            <li>
              <a class="font-semibold transition hover:text-brand-deep" href="{{ "/privacy-policy" | relLangURL }}">{{ T "privacyPolicy" }}</a>
            </li>
            <li>
              <a class="font-semibold transition hover:text-brand-deep" href="{{ "/terms-and-conditions" | relLangURL }}">{{ T "termsAndConditions" }}</a>
            </li>
          </ul>
        </div>
      </footer>
    </div>
  </body>
</html>
