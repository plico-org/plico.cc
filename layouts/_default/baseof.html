<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ T "metaDescription" }}" />
    <link rel="icon" type="image/png" href="{{ "assets/icon.png" | relURL }}" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: "#4A8EE0",
                soft: "#DCECFF",
                deep: "#012233",
                ink: "#012233",
                cream: "#F6F2E7",
                lime: "#9DF201",
                limeSoft: "#ECFFBC",
                purple: "#C994FF",
                purpleSoft: "#F7E7F8"
              }
            },
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            boxShadow: {
              card: "0 15px 35px rgba(1, 34, 51, 0.14)"
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-brand-cream text-brand-ink antialiased">
    <div class="relative min-h-screen overflow-hidden">
      <div class="pointer-events-none absolute inset-0 -z-10 overflow-hidden" aria-hidden="true">
        <div class="absolute -top-32 -right-32 h-[28rem] w-[28rem] rounded-full opacity-70 blur-3xl bg-[linear-gradient(135deg,#ECFFBC,#DCECFF)]"></div>
        <div class="absolute -bottom-40 -left-32 h-[26rem] w-[26rem] rounded-full opacity-70 blur-3xl bg-[linear-gradient(135deg,#F7E7F8,#ECFFBC)]"></div>
        <div class="absolute top-1/3 left-1/2 h-[20rem] w-[20rem] -translate-x-1/2 rounded-full opacity-40 blur-3xl bg-[linear-gradient(135deg,#DCECFF,#F7E7F8)]"></div>
      </div>

      <header class="relative mx-auto w-full max-w-6xl px-4 pt-6 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between rounded-2xl border border-brand/20 bg-white/90 px-4 py-3 shadow-sm backdrop-blur sm:px-5">
          <a href="{{ "/" | relLangURL }}" aria-label="{{ T "brandAriaLabel" }}">
            {{ partial "animated-wordmark.html" (dict "class" "h-8 sm:h-9") }}
          </a>
          <nav aria-label="{{ T "languageSwitcher" }}" class="flex items-center gap-1 rounded-full border border-brand/20 bg-brand-soft/60 p-1">
            {{ range .AllTranslations }}
              <a
                href="{{ .RelPermalink }}"
                class="rounded-full px-3 py-1 text-xs font-extrabold tracking-wide transition {{ if eq $.Site.Language.Lang .Lang }}bg-brand text-white shadow-sm{{ else }}text-brand-ink/75 hover:bg-brand/15{{ end }}"
                aria-current="{{ if eq $.Site.Language.Lang .Lang }}page{{ else }}false{{ end }}"
              >
                {{ .Lang | upper }}
              </a>
            {{ end }}
          </nav>
        </div>
      </header>

      {{ block "main" . }}{{ end }}

      <footer class="relative mx-auto mt-16 w-full max-w-6xl px-4 pb-8 sm:px-6 lg:px-8">
        <div class="flex flex-col items-start justify-between gap-4 rounded-2xl border border-brand/20 bg-white/90 px-4 py-5 text-sm shadow-sm sm:flex-row sm:items-center sm:px-5">
          <p class="text-brand-ink/70">{{ T "footerNote" }}</p>
          <ul class="flex items-center gap-4 text-brand">
            <li>
              <a class="font-semibold transition hover:text-brand-deep" href="{{ "/privacy-policy" | relLangURL }}">{{ T "privacyPolicy" }}</a>
            </li>
            <li>
              <a class="font-semibold transition hover:text-brand-deep" href="{{ "/terms-and-conditions" | relLangURL }}">{{ T "termsAndConditions" }}</a>
            </li>
          </ul>
        </div>
      </footer>
    </div>
  </body>
</html>
