{{ define "main" }}
  <main class="mx-auto mt-10 w-full max-w-4xl px-4 sm:px-6 lg:mt-12 lg:px-8">
    <article class="rounded-3xl border border-brand/20 bg-white/95 p-6 shadow-card sm:p-8 lg:p-10">
      <header class="mb-8 border-b border-brand/15 pb-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-[#1a1a1a] sm:text-4xl">{{ .Title }}</h1>
        {{ with .Description }}
          <p class="mt-3 text-base leading-relaxed text-[#1a1a1a]/70 sm:text-lg">{{ . }}</p>
        {{ end }}
      </header>

      <div class="text-base leading-7 text-[#1a1a1a]/90 [&_h2]:mt-8 [&_h2]:text-2xl [&_h2]:font-bold [&_h2]:tracking-tight [&_h3]:mt-6 [&_h3]:text-xl [&_h3]:font-semibold [&_p]:mt-4 [&_a]:font-semibold [&_a]:text-brand [&_a]:underline [&_a]:underline-offset-2 hover:[&_a]:text-brand-deep [&_ul]:mt-4 [&_ul]:list-disc [&_ul]:pl-5 [&_ol]:mt-4 [&_ol]:list-decimal [&_ol]:pl-5 [&_li]:mt-2 [&_strong]:font-bold">
        {{ .Content }}
      </div>
    </article>
  </main>
{{ end }}
