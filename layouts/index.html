{{ define "main" }}
  <main class="relative mx-auto flex w-full max-w-6xl flex-col justify-center px-4 py-10 sm:px-6 lg:min-h-[70vh] lg:px-8 lg:py-12" aria-label="{{ T "mainNavigation" }}">
    <div class="flex flex-col items-center gap-10 lg:flex-row lg:gap-16">
      <div class="order-2 w-full lg:order-1 lg:w-1/2">
        <img src="{{ "assets/ILLUSTRATIONS/HAND/HAND.png" | relURL }}" alt="{{ T "productImageAlt" }}" class="mx-auto h-auto w-full max-w-sm lg:max-w-none" />
      </div>

      <div class="order-1 w-full lg:order-2 lg:w-1/2">
        <ul class="flex flex-wrap items-center gap-2" aria-hidden="true">
          <li class="inline-flex items-center gap-1.5 rounded-full bg-brand-limeSoft px-3 py-1 text-xs font-bold text-[#012233]">
            <span class="h-1.5 w-1.5 rounded-full bg-brand-lime"></span>{{ T "heroTagSecure" }}
          </li>
          <li class="inline-flex items-center gap-1.5 rounded-full bg-brand-soft px-3 py-1 text-xs font-bold text-[#012233]">
            <span class="h-1.5 w-1.5 rounded-full bg-brand"></span>{{ T "heroTagSimple" }}
          </li>
          <li class="inline-flex items-center gap-1.5 rounded-full bg-brand-purpleSoft px-3 py-1 text-xs font-bold text-[#012233]">
            <span class="h-1.5 w-1.5 rounded-full bg-brand-purple"></span>{{ T "heroTagFast" }}
          </li>
        </ul>

        <h1 class="mt-5 max-w-xl text-4xl font-extrabold leading-tight tracking-tight text-[#012233] sm:text-5xl">{{ T "heroTitle" }}</h1>
        <p class="mt-4 max-w-xl text-base leading-relaxed text-[#012233] sm:text-lg">{{ T "heroSubtitle" }}</p>

        <div class="mt-8 flex flex-wrap items-center gap-3 sm:gap-4" aria-label="{{ T "mainNavigation" }}">
          <a href="#" aria-label="{{ T "appStoreAlt" }}" class="transition hover:scale-[1.02] hover:opacity-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2">
            <img src="{{ "assets/Download_on_the_App_Store_Badge.png" | relURL }}" alt="{{ T "appStoreAlt" }}" class="h-11 w-auto sm:h-12" />
          </a>
          <a href="#" aria-label="{{ T "googlePlayAlt" }}" class="transition hover:scale-[1.02] hover:opacity-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2">
            <img src="{{ "assets/Google_Play_Store_badge.png" | relURL }}" alt="{{ T "googlePlayAlt" }}" class="h-11 w-auto sm:h-12" />
          </a>
        </div>
      </div>
    </div>
  </main>
{{ end }}
