defaultContentLanguage = 'it'
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = false

[languages]
  [languages.en]
    locale = 'en-us'
    label = 'English'
    title = 'Plico'
    weight = 2
    contentDir = 'content/en'

    [languages.en.params]
      subtitle = 'A simple, retro theme for Hugo'
      owner = ''
      keywords = ''
      copyright = ''
      menuMore = 'Show more'
      readMore = 'Read more'
      readOtherPosts = 'Read other posts'
      newerPosts = 'Newer posts'
      olderPosts = 'Older posts'
      missingContentMessage = 'Page not found...'
      missingBackButtonLabel = 'Back to home page'
      minuteReadingTime = 'min read'
      words = 'words'
      showLanguageSelector = true

      [languages.en.params.logo]
        logoText = 'Plico'

      [[languages.en.menu.main]]
        identifier = 'about'
        name = 'About'
        pageRef = '/about'
        weight = 10

      [[languages.en.menu.main]]
        identifier = 'privacy'
        name = 'Privacy'
        pageRef = '/privacy-policy'
        weight = 20

      [[languages.en.menu.main]]
        identifier = 'terms'
        name = 'Terms and Conditions'
        pageRef = '/terms-and-conditions'
        weight = 30

  [languages.it]
    locale = 'it-it'
    label = 'Italiano'
    title = 'Plico'
    weight = 1
    contentDir = 'content/it'

    [languages.it.params]
      subtitle = 'Un tema retro e minimale per Hugo'
      owner = ''
      keywords = ''
      copyright = ''
      menuMore = 'Mostra altro'
      readMore = 'Leggi tutto'
      readOtherPosts = 'Altri articoli'
      newerPosts = 'Articoli più recenti'
      olderPosts = 'Articoli più vecchi'
      missingContentMessage = 'Pagina non trovata...'
      missingBackButtonLabel = 'Torna alla home'
      minuteReadingTime = 'min di lettura'
      words = 'parole'
      showLanguageSelector = true

      [languages.it.params.logo]
        logoText = 'Plico'

      [[languages.it.menu.main]]
        identifier = 'about'
        name = 'Informazioni'
        pageRef = '/about'
        weight = 10

      [[languages.it.menu.main]]
        identifier = 'privacy'
        name = 'Privacy'
        pageRef = '/privacy-policy'
        weight = 20

      [[languages.it.menu.main]]
        identifier = 'terms'
        name = 'Termini e Condizioni'
        pageRef = '/terms-and-conditions'
        weight = 30


[module]
[[module.imports]]
  path = 'github.com/panr/hugo-theme-terminal/v4'
